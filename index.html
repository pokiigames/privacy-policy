    <style>
/* CroomX Admin — dark theme */
:root {
  --bg: #0a0a0a;
  --bg-elevated: #141414;
  --bg-card: #1a1a1a;
  --bg-hover: #222222;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --text-muted: #9ca3af;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --sidebar-w: 260px;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  min-height: 100%;
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

a {
  color: var(--accent);
  text-decoration: none;
}

button,
input,
select,
textarea {
  font: inherit;
}

.hidden {
  display: none !important;
}

/* ── Login / denied ── */
.screen-center {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 1.5rem;
  background: radial-gradient(ellipse at top, #1a1a2e 0%, var(--bg) 60%);
}

.auth-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2.5rem;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow);
}

.auth-card .logo {
  font-size: 3rem;
  margin-bottom: 0.5rem;
}

.auth-card h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}

.auth-card p {
  color: var(--text-muted);
  margin-bottom: 1.5rem;
  font-size: 0.95rem;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.7rem 1.25rem;
  border-radius: 10px;
  border: 1px solid transparent;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.15s, border-color 0.15s;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  width: 100%;
}

.btn-primary:hover {
  background: var(--accent-hover);
}

.btn-outline {
  background: transparent;
  border-color: var(--border);
  color: var(--text);
}

.btn-outline:hover {
  background: var(--bg-hover);
}

.btn-danger {
  background: var(--danger);
  color: #fff;
}

.btn-danger:hover {
  background: #dc2626;
}

.btn-sm {
  padding: 0.4rem 0.85rem;
  font-size: 0.85rem;
}

.alert {
  padding: 0.85rem 1rem;
  border-radius: 10px;
  margin-bottom: 1rem;
  text-align: left;
  font-size: 0.9rem;
}

.alert-error {
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.4);
  color: #fca5a5;
}

.alert-info {
  background: rgba(59, 130, 246, 0.12);
  border: 1px solid rgba(59, 130, 246, 0.35);
  color: #93c5fd;
}

/* ── Layout ── */
#app-shell {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-elevated);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  transition: transform 0.2s;
}

.sidebar-brand {
  padding: 1.25rem 1.5rem;
  font-weight: 700;
  font-size: 1.1rem;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.nav {
  flex: 1;
  padding: 0.75rem;
  overflow-y: auto;
}

.nav a {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.7rem 1rem;
  border-radius: 10px;
  color: var(--text-muted);
  margin-bottom: 0.25rem;
  transition: background 0.15s, color 0.15s;
}

.nav a:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.nav a.active {
  background: rgba(59, 130, 246, 0.15);
  color: var(--accent);
}

.nav a .icon {
  font-size: 1.2rem;
  width: 1.5rem;
  text-align: center;
}

.sidebar-footer {
  padding: 1rem;
  border-top: 1px solid var(--border);
}

.user-info {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}

.user-info img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg-hover);
}

.user-info .email {
  font-size: 0.75rem;
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.main {
  flex: 1;
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  background: var(--bg);
}

.topbar {
  display: none;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
  align-items: center;
  gap: 0.75rem;
}

.content {
  padding: 1.5rem 2rem 2rem;
  max-width: 1400px;
  transition: opacity 0.12s ease;
}

.content.is-navigating {
  opacity: 0.72;
  pointer-events: none;
}

.page-header {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.page-header h2 {
  font-size: 1.75rem;
  font-weight: 700;
}

.page-header .subtitle {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-top: 0.25rem;
}

.page-actions {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

/* ── Cards & stats ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
}

.stat-card .label {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-bottom: 0.35rem;
}

.stat-card .value {
  font-size: 2rem;
  font-weight: 700;
}

.stat-card .value.green {
  color: var(--success);
}

.stat-card .value.blue {
  color: var(--accent);
}

.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
}

.panel h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
}

.user-list {
  list-style: none;
}

.user-list li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.6rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.9rem;
}

.user-list li:last-child {
  border-bottom: none;
}

.user-list .meta {
  color: var(--text-muted);
  font-size: 0.8rem;
}

.badge {
  display: inline-block;
  padding: 0.15rem 0.55rem;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 600;
}

.badge-success {
  background: rgba(34, 197, 94, 0.2);
  color: var(--success);
}

.badge-danger {
  background: rgba(239, 68, 68, 0.2);
  color: var(--danger);
}

.badge-muted {
  background: var(--bg-hover);
  color: var(--text-muted);
}

.badge-warn {
  background: rgba(245, 158, 11, 0.2);
  color: var(--warning);
}

.badge-info {
  background: rgba(59, 130, 246, 0.2);
  color: var(--accent);
}

/* ── Table ── */
.table-wrap {
  overflow-x: auto;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}

th,
td {
  padding: 0.75rem 1rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

th {
  color: var(--text-muted);
  font-weight: 600;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  background: var(--bg-elevated);
}

tr:hover td {
  background: var(--bg-hover);
}

tr.clickable {
  cursor: pointer;
}

.text-right {
  text-align: right;
}

.empty {
  text-align: center;
  color: var(--text-muted);
  padding: 2rem;
}

/* ── Forms ── */
.search-input,
.form-input {
  width: 100%;
  padding: 0.7rem 1rem;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  margin-bottom: 1rem;
}

.search-input:focus,
.form-input:focus {
  outline: none;
  border-color: var(--accent);
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1rem;
}

.form-group label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 0.35rem;
}

.toggle-group {
  display: inline-flex;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.toggle-group button {
  padding: 0.45rem 0.9rem;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
}

.toggle-group button.active {
  background: var(--accent);
  color: #fff;
}

.switch-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 1rem 0;
}

.switch {
  position: relative;
  width: 48px;
  height: 26px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.switch .slider {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 26px;
  cursor: pointer;
  transition: 0.2s;
}

.switch .slider::before {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  left: 3px;
  bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: 0.2s;
}

.switch input:checked + .slider {
  background: var(--accent);
}

.switch input:checked + .slider::before {
  transform: translateX(22px);
}

.loading {
  display: grid;
  place-items: center;
  padding: 4rem;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.task-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
}

.task-chip {
  width: 26px;
  height: 26px;
  display: grid;
  place-items: center;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 700;
}

.task-chip.done {
  background: rgba(34, 197, 94, 0.25);
  color: var(--success);
}

.task-chip.pending {
  background: var(--bg-hover);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.form-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-top: 1.5rem;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg-hover);
  vertical-align: middle;
  margin-right: 0.5rem;
}

.avatar-lg {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--bg-hover);
}

.user-detail-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .main {
    margin-left: 0;
  }

  .topbar {
    display: flex;
  }

  .content {
    padding: 1rem;
  }
}

/* ── Bar chart (season leaderboard) ── */
.chart-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1.5rem;
}

.chart-panel.maximized .chart-panel-body svg {
  min-height: 420px;
}

.chart-panel.minimized .chart-panel-body {
  display: none;
}

.chart-panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.chart-panel.minimized .chart-panel-head {
  margin-bottom: 0;
}

.chart-panel h3 {
  font-size: 1rem;
  font-weight: 600;
  margin: 0;
}

.chart-controls {
  display: flex;
  gap: 0.35rem;
}

.chart-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  display: grid;
  place-items: center;
}

.chart-btn:hover {
  background: var(--bg-hover);
}

.chart-panel:fullscreen {
  padding: 2rem;
  overflow: auto;
  background: var(--bg-card);
}

.chart-panel:fullscreen .chart-panel-body svg {
  min-height: 70vh;
}

.charts-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.charts-row .chart-panel {
  margin-bottom: 0;
}

.chart-panel.maximized {
  grid-column: 1 / -1;
}

.chart-wrap {
  overflow-x: auto;
  background: #f8fafc;
  border-radius: 10px;
  padding: 0.75rem;
}

.chart-wrap svg {
  display: block;
  min-width: 100%;
}

.chart-axis-label {
  fill: #334155;
  font-size: 12px;
  font-weight: 600;
}

.chart-tick {
  fill: #64748b;
  font-size: 11px;
}

.chart-bar-value {
  fill: #dc2626;
  font-size: 12px;
  font-weight: 700;
}

.chart-bar-label {
  fill: #1e293b;
  font-size: 11px;
  font-weight: 600;
}

.season-form {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.season-form label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 0.35rem;
}

.season-form input {
  width: 100%;
  padding: 0.55rem 0.75rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text);
}

.chart-btn-text {
  width: auto;
  padding: 0 0.65rem;
  font-size: 0.75rem;
  font-weight: 600;
}

.season-compare-controls {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1rem;
  align-items: end;
  margin-bottom: 1rem;
}

.season-compare-controls label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 0.35rem;
}

.season-compare-controls input,
.season-compare-controls select {
  width: 100%;
  padding: 0.55rem 0.75rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text);
}

.season-users-panel {
  margin-top: 1rem;
}

.season-users-panel h4 {
  font-size: 0.95rem;
  margin-bottom: 0.75rem;
}

.season-tab-row {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}

.season-pick-row {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
}

.season-pick-row button.active {
  background: rgba(59, 130, 246, 0.2);
  border-color: var(--accent);
  color: var(--accent);
}

.season-pick-row button.current {
  box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.35);
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
    </style>

async function ensureDb() {
  if (!dbReady) {
    dbReady = (async () => {
      const [{ getFirestore, collection, doc }, { getDatabase }] = await Promise.all([
        import('https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js'),
        import('https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js'),
      ]);
      firestore = getFirestore(app);
      rtdb = getDatabase(app);
      usersCol = collection(firestore, 'users');
      adminsDoc = doc(firestore, 'admins', 'admin_emails');
      seasonConfigDoc = doc(firestore, 'app_config', 'leaderboard');
      dailyTasksMetaDoc = doc(firestore, 'app_config', 'daily_tasks');
    })();
  }
  await dbReady;
  return { firestore, rtdb, usersCol, adminsDoc, seasonConfigDoc, dailyTasksMetaDoc };
}

// ── Utils ──
function todayKey() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function isLoggedInToday(loginRef) {
  if (!loginRef) return false;
  return loginRef >= startOfToday();
}

function startOfToday() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d.getTime();
}

function fmtDate(ms) {
  if (!ms) return '—';
  return new Intl.DateTimeFormat(undefined, {
    dateStyle: 'medium',
    timeStyle: 'short',
  }).format(new Date(ms));
}

function fmtRelative(ms) {
  if (!ms) return 'Never';
  const diff = Date.now() - ms;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'Just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

function userFromMap(id, data) {
  return {
    id,
    email: data.email || '',
    name: data.name || '',
    score: Number(data.score || 0),
    profilePictureUrl: data.profilePictureUrl || '',
    lastUpdated: Number(data.lastUpdated || Date.now()),
    rank: Number(data.rank || 0),
    gamesPlayed: Number(data.gamesPlayed || 0),
    gamesWon: Number(data.gamesWon || 0),
    playerCode: data.playerCode || '',
    lastLogin: Number(data.lastLogin || 0),
    isBanned: Boolean(data.isBanned),
    bannedUntil: Number(data.bannedUntil || 0),
  };
}

function isBanned(user) {
  if (!user.isBanned) return false;
  return user.bannedUntil === 0 || user.bannedUntil > Date.now();
}

function isAdminUser(user, emails) {
  const e = (user.email || '').toLowerCase().trim();
  return e && emails.has(e);
}

function playerId(user) {
  return user.playerCode || user.id.slice(0, 8);
}

function isAiGuest(guest) {
  return typeof guest === 'string' && guest.startsWith(AI_GUEST_PREFIX);
}

function isAiRoom(data) {
  return data.isAiOpponent === true || isAiGuest(data.guest);
}

async function isEmailAdmin(email) {
  const normalized = (email || '').toLowerCase().trim();
  if (!normalized) return false;
  try {
    await ensureDb();
    const { getDoc } = await fs();
    const snap = await getDoc(adminsDoc);
    if (!snap.exists()) return normalized === DEFAULT_ADMIN_EMAIL.toLowerCase();
    const emails = (snap.data().emails || []).map((e) => e.toLowerCase().trim());
    return emails.includes(normalized) || normalized === DEFAULT_ADMIN_EMAIL.toLowerCase();
  } catch {
    return normalized === DEFAULT_ADMIN_EMAIL.toLowerCase();
  }
}

async function resolveAdminEmails() {
  if (adminEmailsCache) return adminEmailsCache;
  try {
    await ensureDb();
    const { getDoc } = await fs();
    const snap = await getDoc(adminsDoc);
    if (!snap.exists()) {
      adminEmailsCache = new Set([DEFAULT_ADMIN_EMAIL.toLowerCase()]);
      return adminEmailsCache;
    }
    const emails = (snap.data().emails || [DEFAULT_ADMIN_EMAIL])
      .map((e) => e.toLowerCase().trim())
      .filter(Boolean);
    adminEmailsCache = new Set(emails.length ? emails : [DEFAULT_ADMIN_EMAIL.toLowerCase()]);
    return adminEmailsCache;
  } catch {
    adminEmailsCache = new Set([DEFAULT_ADMIN_EMAIL.toLowerCase()]);
    return adminEmailsCache;
  }
}

    Number(seasonId.replace(/^s/i, '')) ||

async function getSeasonLeaderboard(seasonId, max = 10) {
  await ensureDb();
  const { getDocs, limit, orderBy, query, whereEqualTo } = await fs();
  try {
    const q = query(
      usersCol,
      whereEqualTo('currentSeasonId', seasonId.toLowerCase()),
      orderBy('score', 'desc'),
      limit(max),
    );
    const snap = await getDocs(q);
    if (snap.docs.length) {
      return snap.docs.map((d, i) => ({ ...userFromMap(d.id, d.data()), rank: i + 1 }));
    }
  } catch {
    // Fall back when composite index is missing.
  }

  const q = query(usersCol, orderBy('score', 'desc'), limit(200));
  const snap = await getDocs(q);
  return snap.docs
    .filter((d) => userMatchesSeason(d.data(), seasonId))
    .slice(0, max)
    .map((d, i) => ({ ...userFromMap(d.id, d.data()), rank: i + 1 }));
}

async function getSeasonStats(seasonId) {
  await ensureDb();
  const { getDocs } = await fs();
  const adminEmails = await resolveAdminEmails();
  const snap = await getDocs(usersCol);
  let players = 0;
  let totalScore = 0;
  let activeToday = 0;

  snap.docs.forEach((d) => {
    const user = userFromMap(d.id, d.data());
    if (isAdminUser(user, adminEmails)) return;
    if (!userMatchesSeason(d.data(), seasonId)) return;
    players++;
    totalScore += user.score;
    const loginRef = user.lastLogin > 0 ? user.lastLogin : user.lastUpdated;
    if (isLoggedInToday(loginRef)) activeToday++;
  });

  return { players, totalScore, activeToday, avgScore: players ? Math.round(totalScore / players) : 0 };
}

async function buildSeasonIndex(config) {
  await ensureDb();
  const { getDocs, collection } = await fs();
  const adminEmails = await resolveAdminEmails();
  const usersSnap = await getDocs(usersCol);

  const maxNum = Math.max(1, config.seasonNumber);
  const seasons = Array.from({ length: maxNum }, (_, i) => {
    const num = i + 1;
    const seasonId = `s${num}`;
    const isCurrent = seasonId === config.seasonId.toLowerCase();
    return {
      seasonId,
      seasonNumber: num,
      label: isCurrent ? config.seasonLabel : `Season ${num}`,
      count: 0,
      users: [],
    };
  });
  const byId = Object.fromEntries(seasons.map((s) => [s.seasonId, s]));
  const userSets = Object.fromEntries(seasons.map((s) => [s.seasonId, new Set()]));

  const eligibleDocs = usersSnap.docs.filter((d) => !isAdminUser(userFromMap(d.id, d.data()), adminEmails));

  const historyByUser = new Map();
  await Promise.all(
    eligibleDocs.map(async (d) => {
      const histSnap = await getDocs(collection(firestore, 'users', d.id, 'seasonHistory'));
      historyByUser.set(
        d.id,
        histSnap.docs.map((h) => ({ seasonId: h.id.toLowerCase(), ...h.data() })),
      );
    }),
  );

  for (const d of eligibleDocs) {
    const user = userFromMap(d.id, d.data());
    const currentSid = (d.data().currentSeasonId || DEFAULT_SEASON_ID).toLowerCase();

    if (byId[currentSid]) {
      userSets[currentSid].add(d.id);
      byId[currentSid].users.push({ ...user, source: 'current' });
    }

    for (const h of historyByUser.get(d.id) || []) {
      const sid = (h.seasonId || '').toLowerCase();
      if (!byId[sid]) continue;
      userSets[sid].add(d.id);
      if (currentSid !== sid) {
        byId[sid].users.push({
          ...user,
          score: Number(h.score || 0),
          gamesPlayed: Number(h.gamesPlayed || 0),
          gamesWon: Number(h.gamesWon || 0),
          rank: Number(h.rank || 0),
          source: 'archived',
        });
      }
    }
  }

  for (const s of seasons) {
    s.count = userSets[s.seasonId].size;
    s.users.sort((a, b) => b.score - a.score || (a.name || '').localeCompare(b.name || ''));
    s.users.forEach((u, i) => {
      u.rank = i + 1;
    });
  }

  return {
    seasons,
    currentSeasonId: config.seasonId.toLowerCase(),
    getSeason(seasonId) {
      return byId[seasonId.toLowerCase()] || null;
    },
  };
}

function seasonLabelForId(seasonId, fallbackLabel) {
  if (fallbackLabel) return fallbackLabel;
  const num = Number(String(seasonId).replace(/^s/i, ''));
  return num ? `Season ${num}` : seasonId.toUpperCase();
}

async function getSeasonComparison(oldId, newId, oldLabel, newLabel) {
  const config = await getSeasonConfig();
  const index = await buildSeasonIndex(config);
  const oldSeason = index.getSeason(oldId) || { seasonId: oldId, label: seasonLabelForId(oldId, oldLabel), count: 0, users: [] };
  const newSeason = index.getSeason(newId) || { seasonId: newId, label: seasonLabelForId(newId, newLabel), count: 0, users: [] };

  return {
    oldSeason: {
      id: oldId.toLowerCase(),
      label: oldLabel || oldSeason.label,
      count: oldSeason.count,
      users: oldSeason.users,
    },
    newSeason: {
      id: newId.toLowerCase(),
      label: newLabel || newSeason.label,
      count: newSeason.count,
      users: newSeason.users,
    },
  };
}

async function resetAllDailyTasks() {
  await ensureDb();
  const { getDocs, writeBatch, doc } = await fs();
  const adminEmails = await resolveAdminEmails();
  const snap = await getDocs(usersCol);
  const today = todayKey();
  const emptyTasks = buildEmptyTodayTasks();
  const payload = {
    dailyTaskDate: today,
    dailyTasksCompleted: [],
    dailyTaskCount: 0,
    dailyTaskAllComplete: false,
    dailyTaskUpdatedAt: Date.now(),
    todayTasks: emptyTasks,
  };

  let batch = writeBatch(firestore);
  let ops = 0;
  let resetCount = 0;

  for (const d of snap.docs) {
    const user = userFromMap(d.id, d.data());
    if (isAdminUser(user, adminEmails)) continue;
    batch.update(doc(firestore, 'users', d.id), payload);
    ops++;
    resetCount++;
    if (ops >= 400) {
      await batch.commit();
      batch = writeBatch(firestore);
      ops = 0;
    }
  }
  if (ops > 0) await batch.commit();
  await saveDailyResetMeta(today);
  return resetCount;
}

async function maybeAutoResetDailyTasks() {
  const today = todayKey();
  const meta = await getDailyResetMeta();
  if (meta.lastResetDate === today) return null;
  return resetAllDailyTasks();
}

async function getDashboardStats() {
  const now = Date.now();
  const dayStart = startOfToday();
  const { getDocs } = await fs();
  const [adminEmails, snapshot] = await Promise.all([resolveAdminEmails(), getDocs(usersCol)]);

  const online = [];
  const today = [];
  const inactive = [];
  let total = 0;
  let loginTodayTotal = 0;

  snapshot.docs.forEach((d) => {
    const user = userFromMap(d.id, d.data());
    if (isAdminUser(user, adminEmails)) return;
    total++;
    const loginRef = user.lastLogin > 0 ? user.lastLogin : user.lastUpdated;
    const loggedToday = isLoggedInToday(loginRef);

    if (isBanned(user)) {
      inactive.push(user);
      return;
    }
    const onlineNow = now - user.lastUpdated <= ACTIVE_NOW_MS;
    if (loggedToday) loginTodayTotal++;
    if (onlineNow) online.push(user);
    else if (loggedToday) today.push(user);
    else inactive.push(user);
  });

  const sort = (u) => Math.max(u.lastUpdated, u.lastLogin);
  online.sort((a, b) => sort(b) - sort(a));
  today.sort((a, b) => sort(b) - sort(a));
  inactive.sort((a, b) => sort(b) - sort(a));

  return {
    totalUsers: total,
    activeNow: online.length,
    activeToday: loginTodayTotal,
    inactiveUsers: inactive.length,
    loginTodayOnly: today.length,
    online,
    today,
    inactive,
    dayStart,
    generatedAt: now,
  };
}

function parseTasks(data) {
  const todayTasks = data.todayTasks || {};
  return ALL_TASK_IDS.map((taskId) => {
    const t = todayTasks[String(taskId)] || {};
    return {
      taskId,
      taskName: taskTitle(taskId),
      completed: Boolean(t.completed),
    };
  });
}

function buildTaskRow(docData, user, adminEmails) {
  if (isAdminUser(user, adminEmails)) return null;
  const today = todayKey();
  const taskDate = docData.dailyTaskDate || '';
  const updatedAt = Number(docData.dailyTaskUpdatedAt || 0);
  const entries = parseTasks(docData);
  const hasToday = entries.some((t) => t.completed);
  const legacy = (docData.dailyTasksCompleted || []).map(Number);
  const legacyCount = Number(docData.dailyTaskCount ?? legacy.length);
  const legacyAll = Boolean(docData.dailyTaskAllComplete ?? legacyCount >= ALL_TASK_IDS.length);

  const tasks =
    entries.some((t) => t.completed) || Object.keys(docData.todayTasks || {}).length
      ? entries
      : ALL_TASK_IDS.map((id) => ({
          taskId: id,
          taskName: taskTitle(id),
          completed: legacy.includes(id),
        }));

  const completedCount = tasks.filter((t) => t.completed).length;
  const isToday = taskDate === today || hasToday;
  const allFive =
    Object.keys(docData.todayTasks || {}).length > 0
      ? isToday && completedCount >= ALL_TASK_IDS.length
      : isToday && legacyAll;

  return {
    user,
    tasks,
    completedCount: isToday ? completedCount : 0,
    allFiveComplete: allFive,
    taskDate: taskDate || (hasToday ? today : ''),
    updatedAt: isToday ? updatedAt : 0,
  };
}

async function getDailyTasks() {
  const { getDocs } = await fs();
  const [adminEmails, snap] = await Promise.all([resolveAdminEmails(), getDocs(usersCol)]);
  return snap.docs
    .map((d) => buildTaskRow(d.data(), userFromMap(d.id, d.data()), adminEmails))
    .filter(Boolean)
    .sort((a, b) => {
      if (a.allFiveComplete !== b.allFiveComplete) return a.allFiveComplete ? 1 : -1;
      if (a.completedCount !== b.completedCount) return b.completedCount - a.completedCount;
      return a.user.name.localeCompare(b.user.name);
    });
}

function parseRtdbRooms(snap) {
  return snap.exists() ? snap.val() : null;
}

async function getMatches(aiOnly) {
  const { get, ref } = await rtdbApi();
  const snaps = await Promise.all(GAME_PATHS.map(({ path }) => get(ref(rtdb, path))));
  const records = [];

  GAME_PATHS.forEach(({ path, label }, i) => {
    const rooms = parseRtdbRooms(snaps[i]);
    if (!rooms) return;
    for (const [code, data] of Object.entries(rooms)) {
      const isAi = isAiRoom(data);
      if (aiOnly && !isAi) continue;
      if (!aiOnly && isAi) continue;
      if (data.gameEnded !== true) continue;
      const endedAt = Number(data.matchEndsAt ?? data.createdAt ?? 0);
      records.push({
        gamePath: path,
        gameType: label,
        roomCode: code,
        hostName: data.hostName || 'Host',
        guestName: data.guestName || 'Guest',
        hostScore: Number(data.hostScore ?? data.hostWins ?? 0),
        guestScore: Number(data.guestScore ?? data.guestWins ?? 0),
        winner: data.winner || '',
        betAmount: Number(data.betAmount ?? 0),
        endedAt,
        isAi: isAi,
      });
    }
  });
  return records.sort((a, b) => b.endedAt - a.endedAt);
}

async function getAiRecords() {
  const { get, ref } = await rtdbApi();
  const snaps = await Promise.all(GAME_PATHS.map(({ path }) => get(ref(rtdb, path))));
  const records = [];

  GAME_PATHS.forEach(({ path, label }, i) => {
    const rooms = parseRtdbRooms(snaps[i]);
    if (!rooms) return;
    for (const [code, data] of Object.entries(rooms)) {
      if (!isAiRoom(data)) continue;
      const ended = data.gameEnded === true;
      const started = data.gameStarted === true;
      records.push({
        gamePath: path,
        gameType: label,
        roomCode: code,
        aiName: data.guestName || 'AI Bot',
        hostName: data.hostName || 'Host',
        joinedAt: Number(data.aiJoinedAt ?? data.createdAt ?? 0),
        status: ended ? 'ended' : started ? 'in_match' : 'waiting',
        betAmount: Number(data.betAmount ?? 0),
      });
    }
  });
  return records.sort((a, b) => b.joinedAt - a.joinedAt);
}

async function deleteRtdbRoom(gamePath, roomCode) {
  const { ref, remove } = await rtdbApi();
  await remove(ref(rtdb, `${gamePath}/${roomCode}`));
}

async function deleteAllMatchRecords(aiOnly) {
  const records = await getMatches(aiOnly);
  await Promise.all(records.map((r) => deleteRtdbRoom(r.gamePath, r.roomCode)));
  return records.length;
}

async function deleteAllAiRooms() {
  const records = await getAiRecords();
  await Promise.all(records.map((r) => deleteRtdbRoom(r.gamePath, r.roomCode)));
  return records.length;
}

const CHART_COLORS = ['#22c55e', '#3b82f6', '#eab308', '#ec4899', '#a855f7', '#f97316', '#06b6d4', '#ef4444'];

function renderBarChartSvg(labels, values, { yLabel = 'Count', xLabel = 'Category', markerId } = {}) {
  if (!labels.length) {
    return '<p class="empty">No chart data yet.</p>';
  }

  const arrowId = markerId || `arrow-${Math.random().toString(36).slice(2, 9)}`;

  const maxVal = Math.max(...values, 1);
  const yMax = Math.max(10, Math.ceil(maxVal / 5) * 5);
  const tickStep = yMax <= 10 ? 1 : Math.ceil(yMax / 10);
  const ticks = [];
  for (let v = 0; v <= yMax; v += tickStep) ticks.push(v);

  const barW = 56;
  const gap = 32;
  const chartH = 260;
  const padL = 56;
  const padR = 28;
  const padT = 28;
  const padB = 88;
  const innerW = labels.length * barW + (labels.length - 1) * gap;
  const width = padL + innerW + padR;
  const height = padT + chartH + padB;
  const gridLines = ticks
    .map((t) => {
      const y = padT + chartH - (t / yMax) * chartH;
      return `<line x1="${padL}" y1="${y}" x2="${width - padR}" y2="${y}" stroke="#cbd5e1" stroke-width="1"/>`;
    })
    .join('');

  const yLabels = ticks
    .map((t) => {
      const y = padT + chartH - (t / yMax) * chartH;
      return `<text class="chart-tick" x="${padL - 10}" y="${y + 4}" text-anchor="end">${t}</text>`;
    })
    .join('');

  const bars = labels
    .map((label, i) => {
      const val = values[i];
      const h = Math.max(2, (val / yMax) * chartH);
      const x = padL + i * (barW + gap);
      const y = padT + chartH - h;
      const color = CHART_COLORS[i % CHART_COLORS.length];
      const guideY = y;
      const short = label.length > 12 ? `${label.slice(0, 11)}…` : label;
      return `
        <rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="${color}" rx="4"/>
        <line x1="${padL - 4}" y1="${guideY}" x2="${x + barW / 2}" y2="${guideY}" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#${arrowId})"/>
        <text class="chart-bar-value" x="${x + barW / 2}" y="${padT + chartH + 18}" text-anchor="middle">${val}</text>
        <text class="chart-bar-label" x="${x + barW / 2}" y="${padT + chartH + 38}" text-anchor="middle">${esc(short)}</text>
      `;
    })
    .join('');

  return `
    <div class="chart-wrap">
      <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" role="img" aria-label="${esc(yLabel)} bar chart">
        <defs>
          <marker id="${arrowId}" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="#dc2626"/>
          </marker>
        </defs>
        ${gridLines}
        ${yLabels}
        ${bars}
        <text class="chart-axis-label" x="16" y="${padT + chartH / 2}" transform="rotate(-90 16 ${padT + chartH / 2})" text-anchor="middle">${esc(yLabel)}</text>
        <text class="chart-axis-label" x="${padL + innerW / 2}" y="${height - 8}" text-anchor="middle">${esc(xLabel)}</text>
      </svg>
    </div>`;
}

function renderChartPanel(title, labels, values, options = {}) {
  const id = options.id || `chart-${Math.random().toString(36).slice(2, 9)}`;
  const markerId = `arrow-${id}`;
  const extraBtn = options.extraButton
    ? `<button type="button" class="chart-btn chart-btn-text" data-extra-btn="${esc(options.extraButtonId || '')}">${esc(options.extraButton)}</button>`
    : '';
  return `
    <div class="chart-panel" id="${id}" data-chart-panel>
      <div class="chart-panel-head">
        <h3>${esc(title)}</h3>
        <div class="chart-controls">
          ${extraBtn}
          <button type="button" class="chart-btn" data-action="minimize" title="Minimize">−</button>
          <button type="button" class="chart-btn" data-action="maximize" title="Maximize">□</button>
          <button type="button" class="chart-btn" data-action="fullscreen" title="Full screen">⛶</button>
        </div>
      </div>
      <div class="chart-panel-body">
        ${renderBarChartSvg(labels, values, { ...options, markerId })}
      </div>
      ${options.bodyBelow || ''}
    </div>`;
}

function bindChartControls(root = document) {
  root.querySelectorAll('[data-chart-panel]').forEach((panel) => {
    panel.querySelectorAll('.chart-btn[data-action]').forEach((btn) => {
      btn.onclick = () => {
        const action = btn.dataset.action;
        if (action === 'minimize') {
          panel.classList.toggle('minimized');
          panel.classList.remove('maximized');
        } else if (action === 'maximize') {
          panel.classList.toggle('maximized');
          panel.classList.remove('minimized');
        } else if (action === 'fullscreen') {
          if (document.fullscreenElement === panel) {
            void document.exitFullscreen();
          } else {
            void panel.requestFullscreen?.();
          }
        }
      };
    });
  });
}

function renderBarChart(labels, values, options = {}) {
  return renderChartPanel(options.title || 'Chart', labels, values, options);
}

const $ = (sel) => document.querySelector(sel);

const deniedScreen = $('#denied-screen');

let isAdmin = false;

const routes = {
  dashboard: renderDashboard,
  users: renderUsers,
  'user-detail': renderUserDetail,
  tasks: renderTasks,
  matches: renderMatches,
  ai: renderAi,
  season: renderSeason,
};

function show(el) {
  loginScreen.classList.add('hidden');
  deniedScreen.classList.add('hidden');
  appShell.classList.add('hidden');
  el.classList.remove('hidden');
}

function setActiveNav() {
  const hash = location.hash.slice(2) || 'dashboard';
  const page = hash.split('/')[0];
  document.querySelectorAll('.nav a').forEach((a) => {
    a.classList.toggle('active', a.dataset.page === page);
  });
}

function navigate(page, param) {
  pauseAutoRefresh(2500);
  location.hash = param ? `#/${page}/${param}` : `#/${page}`;
}

const REFRESH_INTERVAL_MS = 2500;
let currentRouteKey = '';
let routeBusy = false;
let routeGeneration = 0;
let pauseRefreshUntil = 0;
let lastHash = '';

function routeKey() {
  return (location.hash.slice(2) || 'dashboard').split('?')[0];
}

function isCurrentRoute(page, param) {
  const key = routeKey();
  return param ? key === `${page}/${param}` : key === page;
}

function pauseAutoRefresh(ms = 2500) {
  pauseRefreshUntil = Date.now() + ms;
}

async function route(options = {}) {
  const soft = options.soft === true;
  const key = routeKey();
  const parts = key.split('/');
  const page = parts[0];
  const param = parts[1];
  const fn = routes[page] || routes.dashboard;

  if (soft) {
    if (Date.now() < pauseRefreshUntil || routeBusy || document.hidden) return;
    if (page === 'user-detail') return;
    if (!['dashboard', 'users', 'season', 'matches', 'ai', 'tasks'].includes(page)) return;
  } else {
    pauseAutoRefresh(2000);
    if (currentRouteKey === key && pageContent.querySelector('.page-header') && !routeBusy) {
      setActiveNav();
      return;
    }
    currentRouteKey = key;
    routeGeneration += 1;
    const myGen = routeGeneration;
    setActiveNav();
    pageContent.classList.add('is-navigating');
    routeBusy = true;
    try {
      await fn(param, { soft });
      if (myGen !== routeGeneration) return;
    } catch (e) {
      if (myGen !== routeGeneration) return;
      pageContent.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`;
    } finally {
      if (myGen === routeGeneration) {
        routeBusy = false;
        pageContent.classList.remove('is-navigating');
      }
    }
    return;
  }

  routeBusy = true;
  const softGen = routeGeneration;
  try {
    await fn(param, { soft });
  } catch (e) {
    // Soft refresh errors are non-blocking.
  } finally {
    if (softGen === routeGeneration) routeBusy = false;
  }
}

let usersPageState = null;
let seasonPageState = { selectedSeasonId: null, showScoreUsers: true };
let matchesPageState = null;
let aiPageState = null;
let dashPanelCache = {};
let lastDashSubtitleAt = 0;
let adminRefreshTimer = null;

function stopAdminAutoRefresh() {
  if (adminRefreshTimer) {
    clearInterval(adminRefreshTimer);
    adminRefreshTimer = null;
  }
}

function startAdminAutoRefresh() {
  stopAdminAutoRefresh();
  adminRefreshTimer = setInterval(() => {
    if (!isAdmin || document.hidden || Date.now() < pauseRefreshUntil || routeBusy) return;
    void route({ soft: true });
  }, REFRESH_INTERVAL_MS);
}

function chartFingerprint(labels, values) {
  return JSON.stringify({ labels, values });
}

const chartRenderCache = new Map();

function mountChartPanel(container, cacheKey, title, labels, values, options = {}) {
  if (!container) return;
  const fp = chartFingerprint(labels, values);
  if (chartRenderCache.get(cacheKey) === fp && container.querySelector('[data-chart-panel]')) {
    return;
  }
  chartRenderCache.set(cacheKey, fp);
  container.innerHTML = renderChartPanel(title, labels, values, options);
  bindChartControls(container);
}

function setTextIfChanged(el, text) {
  if (el && el.textContent !== String(text)) el.textContent = String(text);
}

function usersPanelKey(users) {
  return users.map((u) => `${u.id}:${u.score}:${Math.max(u.lastUpdated, u.lastLogin)}`).join('|');
}

function updateUserPanel(panel, title, users, empty, cacheKey, panelCache) {
  if (!panel) return;
  const key = usersPanelKey(users);
  if (panelCache[cacheKey] === key) return;
  panelCache[cacheKey] = key;
  panel.innerHTML = `<h3>${title}</h3>${userListHtml(users, empty)}`;
}

function userListHtml(users, empty) {
  if (!users.length) return `<p class="empty">${empty}</p>`;
  return `<ul class="user-list">${users
    .slice(0, 20)
    .map(
      (u) => `
    <li>
      <div>
        <strong>${esc(u.name || 'Unnamed')}</strong>
        <div class="meta">${esc(playerId(u))} • ${fmtRelative(Math.max(u.lastUpdated, u.lastLogin))}</div>
      </div>
      <span class="badge badge-muted">${u.score}</span>
    </li>`,
    )
    .join('')}</ul>`;
}

async function renderDashboard(_param, options = {}) {
  const soft = options.soft === true;
  const [stats, resetMeta, config] = await Promise.all([
    getDashboardStats(),
    getDailyResetMeta(),
    getSeasonConfig(),
  ]);
  const seasonIndex = await buildSeasonIndex(config);
  const seasonLabels = seasonIndex.seasons.map((s) => s.label);
  const seasonValues = seasonIndex.seasons.map((s) => s.count);
  const statusLabels = ['Online', 'Login Today', 'Inactive'];
  const statusValues = [stats.activeNow, stats.activeToday, stats.inactiveUsers];

  if (soft && $('#dash-stat-total')) {
    setTextIfChanged($('#dash-stat-total'), stats.totalUsers);
    setTextIfChanged($('#dash-stat-online'), stats.activeNow);
    setTextIfChanged($('#dash-stat-today'), stats.activeToday);
    setTextIfChanged($('#dash-stat-inactive'), stats.inactiveUsers);
    if (Date.now() - lastDashSubtitleAt > 5000) {
      setTextIfChanged($('#dash-subtitle'), `Updated ${fmtDate(stats.generatedAt)} • Live`);
      lastDashSubtitleAt = Date.now();
    }
    updateUserPanel($('#dash-panel-online'), 'Online now', stats.online, 'No users online.', 'online', dashPanelCache);
    updateUserPanel(
      $('#dash-panel-today'),
      'Logged in today',
      [...stats.online, ...stats.today],
      'No users logged in today.',
      'today',
      dashPanelCache,
    );
    updateUserPanel($('#dash-panel-inactive'), 'Inactive / banned', stats.inactive, 'No inactive users.', 'inactive', dashPanelCache);
    mountChartPanel($('#dash-status-chart-slot'), 'dash-status', 'User status', statusLabels, statusValues, {
      id: 'chart-user-status',
      yLabel: 'Number of users',
      xLabel: 'User status',
    });
    mountChartPanel(
      $('#dash-season-chart-slot'),
      'dash-season',
      'All seasons (users saved per season)',
      seasonLabels,
      seasonValues,
      {
        id: 'chart-season-compare',
        yLabel: 'Total users',
        xLabel: 'Season',
      },
    );
    return;
  }

  dashPanelCache = {};
  chartRenderCache.delete('dash-status');
  chartRenderCache.delete('dash-season');

  let resetNotice = '';
  const today = todayKey();
  if (resetMeta.lastResetDate !== today) {
    try {
      const count = await maybeAutoResetDailyTasks();
      if (count !== null) {
        resetNotice = `<div class="alert alert-info">Daily tasks auto-reset for ${count} users (new day after 12:00 AM).</div>`;
      }
    } catch (e) {
      resetNotice = `<div class="alert alert-error">Daily task auto-reset failed: ${esc(e.message)}</div>`;
    }
  }

  const statusLabelsInit = statusLabels;
  const statusValuesInit = statusValues;

  if (!isCurrentRoute('dashboard')) return;

  pageContent.innerHTML = `
    <div class="page-header">
      <div>
        <h2>Dashboard</h2>
        <p class="subtitle" id="dash-subtitle">Updated ${fmtDate(stats.generatedAt)} • Live</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-outline btn-sm" id="dash-reset-tasks">Reset daily tasks</button>
        <button class="btn btn-outline btn-sm" onclick="location.reload()">↻ Refresh</button>
      </div>
    </div>
    ${resetNotice}
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Total users</div><div class="value" id="dash-stat-total">${stats.totalUsers}</div></div>
      <div class="stat-card"><div class="label">Online now (5 min)</div><div class="value green" id="dash-stat-online">${stats.activeNow}</div></div>
      <div class="stat-card"><div class="label">Logged in today</div><div class="value blue" id="dash-stat-today">${stats.activeToday}</div></div>
      <div class="stat-card"><div class="label">Inactive / banned</div><div class="value" id="dash-stat-inactive">${stats.inactiveUsers}</div></div>
    </div>
    <div class="charts-row">
      <div id="dash-status-chart-slot">
      ${renderChartPanel('User status', statusLabelsInit, statusValuesInit, {
        id: 'chart-user-status',
        yLabel: 'Number of users',
        xLabel: 'User status',
      })}
      </div>
      <div id="dash-season-chart-slot">
      ${renderChartPanel('All seasons (users saved per season)', seasonLabels, seasonValues, {
        id: 'chart-season-compare',
        yLabel: 'Total users',
        xLabel: 'Season',
      })}
      </div>
    </div>
    <div class="stats-grid">
      <div class="panel" id="dash-panel-online"><h3>Online now</h3>${userListHtml(stats.online, 'No users online.')}</div>
      <div class="panel" id="dash-panel-today"><h3>Logged in today</h3>${userListHtml([...stats.online, ...stats.today], 'No users logged in today.')}</div>
      <div class="panel" id="dash-panel-inactive"><h3>Inactive / banned</h3>${userListHtml(stats.inactive, 'No inactive users.')}</div>
    </div>
    <p id="dash-msg" class="subtitle"></p>`;

  bindChartControls(pageContent);

  $('#dash-reset-tasks').onclick = async () => {
    pauseAutoRefresh(3000);
    if (!confirm('Reset daily tasks for all users for today?')) return;
    const btn = $('#dash-reset-tasks');
    btn.disabled = true;
    $('#dash-msg').textContent = 'Resetting daily tasks…';
    try {
      const count = await resetAllDailyTasks();
      $('#dash-msg').textContent = `Daily tasks reset for ${count} users.`;
    } catch (e) {
      $('#dash-msg').textContent = e.message || 'Reset failed.';
    } finally {
      btn.disabled = false;
    }
  };
}

async function renderUsers(_param, options = {}) {
  const soft = options.soft === true;
  const config = await getSeasonConfig();
  const seasonIndex = await buildSeasonIndex(config);

  if (!usersPageState || !soft) {
    usersPageState = {
      tab: usersPageState?.tab || 'all',
      query: usersPageState?.query || '',
      selectedSeasonId: usersPageState?.selectedSeasonId || config.seasonId.toLowerCase(),
      tableKey: '',
    };
  }

  usersPageState.seasonIndex = seasonIndex;
  usersPageState.config = config;

  function seasonUsersForTable() {
    const season = seasonIndex.getSeason(usersPageState.selectedSeasonId);
    if (!season) return [];
    let users = season.users.map((u) => ({ ...u }));
    if (usersPageState.tab === 'top') {
      users.sort((a, b) => b.score - a.score || (a.name || '').localeCompare(b.name || ''));
      users.forEach((u, i) => {
        u.rank = i + 1;
      });
    } else {
      users.sort((a, b) => b.lastUpdated - a.lastUpdated);
    }
    const q = usersPageState.query.trim().toLowerCase();
    if (!q) return users;
    return users.filter(
      (u) =>
        (u.name || '').toLowerCase().includes(q) ||
        (u.email || '').toLowerCase().includes(q) ||
        playerId(u).toLowerCase().includes(q),
    );
  }

  function usersTableKey(users) {
    return `${usersPageState.tab}:${usersPageState.selectedSeasonId}:${usersPageState.query}:${users.map((u) => `${u.id}:${u.score}:${u.rank}`).join('|')}`;
  }

  function renderUsersTableBody() {
    const users = seasonUsersForTable();
    const season = seasonIndex.getSeason(usersPageState.selectedSeasonId);
    const hintEl = $('#users-season-hint');
    if (hintEl) {
      setTextIfChanged(hintEl, season ? `${season.label} (${season.count} users) • Live` : 'Season not found');
    }

    document.querySelectorAll('#users-season-row button').forEach((btn) => {
      const sid = btn.dataset.seasonId;
      const s = seasonIndex.getSeason(sid);
      const label = s ? `${s.label} (${s.count})` : sid.toUpperCase();
      if (btn.textContent !== label) btn.textContent = label;
      btn.classList.toggle('active', sid === usersPageState.selectedSeasonId);
      btn.classList.toggle('current', sid === seasonIndex.currentSeasonId);
    });

    const tKey = usersTableKey(users);
    if (usersPageState.tableKey === tKey) return;
    usersPageState.tableKey = tKey;

    $('#users-table-body').innerHTML =
      users.length === 0
        ? '<tr><td colspan="8" class="empty">No users in this season</td></tr>'
        : users
            .map(
              (u) => `
      <tr class="clickable" data-id="${esc(u.id)}">
        <td>${u.profilePictureUrl ? `<img class="avatar" src="${esc(u.profilePictureUrl)}" alt="">` : ''}${esc(u.name || 'Unnamed')}</td>
        <td>${esc(u.email)}</td>
        <td>${esc(playerId(u))}</td>
        <td class="text-right">${u.score}</td>
        <td class="text-right">${usersPageState.tab === 'top' ? u.rank : u.rank || '—'}</td>
        <td>${fmtRelative(u.lastUpdated)}</td>
        <td>${isBanned(u) ? '<span class="badge badge-danger">Banned</span>' : '<span class="badge badge-success">Active</span>'}</td>
        <td>${u.source === 'archived' ? '<span class="badge badge-muted">Archived</span>' : '<span class="badge badge-info">Current</span>'}</td>
      </tr>`,
            )
            .join('');
  }

  if (soft && $('#users-table-body')) {
    renderUsersTableBody();
    return;
  }

  if (!isCurrentRoute('users')) return;

  pageContent.innerHTML = `
    <div class="page-header">
      <div><h2>Users</h2><p class="subtitle">Search by name, email, or player code — filtered by season</p></div>
      <div class="page-actions">
        <div class="toggle-group" id="users-tab">
          <button data-tab="all" class="${usersPageState.tab === 'all' ? 'active' : ''}">All users</button>
          <button data-tab="top" class="${usersPageState.tab === 'top' ? 'active' : ''}">Top scores</button>
        </div>
        <button class="btn btn-outline btn-sm" id="users-refresh">↻ Refresh</button>
      </div>
    </div>
    <div class="panel" style="margin-bottom:1rem;padding:1rem 1.25rem">
      <h3 style="margin-bottom:0.75rem;font-size:0.95rem">Season</h3>
      <div class="season-pick-row" id="users-season-row">
        ${seasonIndex.seasons
          .map(
            (s) => `
          <button type="button" class="btn btn-outline btn-sm ${s.seasonId === usersPageState.selectedSeasonId ? 'active' : ''} ${s.seasonId === seasonIndex.currentSeasonId ? 'current' : ''}" data-season-id="${esc(s.seasonId)}">
            ${esc(s.label)} (${s.count})
          </button>`,
          )
          .join('')}
      </div>
      <p class="subtitle" id="users-season-hint"></p>
    </div>
    <input class="search-input" id="users-search" placeholder="Search players..." value="${esc(usersPageState.query)}" />
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Player</th><th>Email</th><th>Code</th>
          <th class="text-right">Score</th><th class="text-right">Rank</th>
          <th>Last active</th><th>Status</th><th>Season data</th>
        </tr></thead>
        <tbody id="users-table-body"></tbody>
      </table>
    </div>`;

  $('#users-tab').onclick = (e) => {
    const btn = e.target.closest('button[data-tab]');
    if (!btn) return;
    pauseAutoRefresh(1500);
    usersPageState.tab = btn.dataset.tab;
    usersPageState.tableKey = '';
    document.querySelectorAll('#users-tab button').forEach((b) => b.classList.toggle('active', b === btn));
    renderUsersTableBody();
  };
  $('#users-search').oninput = (e) => {
    usersPageState.query = e.target.value;
    usersPageState.tableKey = '';
    renderUsersTableBody();
  };
  $('#users-refresh').onclick = () => {
    pauseAutoRefresh(1500);
    usersPageState.tableKey = '';
    void renderUsers(null, { soft: false });
  };
  $('#users-season-row').onclick = (e) => {
    const btn = e.target.closest('button[data-season-id]');
    if (!btn) return;
    pauseAutoRefresh(1500);
    usersPageState.selectedSeasonId = btn.dataset.seasonId;
    usersPageState.tableKey = '';
    renderUsersTableBody();
  };

  renderUsersTableBody();
}

          <p class="subtitle" id="ban-label">${banned ? (user.bannedUntil > 0 ? `Banned until ${fmtDate(user.bannedUntil)}` : 'Permanently banned') : 'Player is active'}</p>
        </div>
        <label class="switch">
          <input type="checkbox" id="f-ban" ${banned ? 'checked' : ''}>
          <span class="slider"></span>
        </label>
      </div>
      <div id="ban-days-wrap" class="${banned ? '' : 'hidden'}">
        <div class="form-group"><label>Ban days (0 = permanent)</label><input class="form-input" id="f-ban-days" type="number" value="7"></div>
      </div>
      <div class="alert alert-info">Ban writes <code>isBanned</code> and <code>bannedUntil</code> to Firestore.</div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btn-save">Save changes</button>
        <button class="btn btn-danger" id="btn-delete">Delete user</button>
        <button class="btn btn-outline" onclick="navigate('users')">Cancel</button>
      </div>
      <div id="save-msg"></div>
    </div>
    </div>`;

  $('#user-detail-back').onclick = () => navigate('users');

  const banToggle = $('#f-ban');
  const banDaysWrap = $('#ban-days-wrap');
  banToggle.onchange = () => banDaysWrap.classList.toggle('hidden', !banToggle.checked);

  $('#btn-save').onclick = async () => {
    const banOn = banToggle.checked;
    const days = Number($('#f-ban-days').value) || 0;
    const DAY = 86400000;
    try {
      await updateUser(userId, {
        name: $('#f-name').value,
        score: Number($('#f-score').value) || 0,
        rank: Number($('#f-rank').value) || 0,
        gamesPlayed: Number($('#f-played').value) || 0,
        gamesWon: Number($('#f-won').value) || 0,
        isBanned: banOn,
        bannedUntil: !banOn ? 0 : days <= 0 ? 0 : Date.now() + days * DAY,
      });
      navigate('users');
    } catch (e) {
      $('#save-msg').innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`;
    }
  };

  $('#btn-delete').onclick = async () => {
    if (!confirm(`Delete ${user.name}?`)) return;
    await deleteUser(userId);
    navigate('users');
  };
}

let tasksPageState = { filter: 'all' };

async function renderTasks(_param, options = {}) {
  const soft = options.soft === true;
  let filter = tasksPageState.filter;
  let tasksNotice = '';

  try {
    const meta = await getDailyResetMeta();
    if (meta.lastResetDate !== todayKey()) {
      const count = await maybeAutoResetDailyTasks();
      if (count !== null) {
        tasksNotice = `Daily tasks auto-reset for ${count} users (new day after 12:00 AM).`;
      }
    }
  } catch {
    // Non-blocking on tasks page.
  }

  async function load() {
    let rows = await getDailyTasks();
    if (filter === 'done') rows = rows.filter((r) => r.completedCount >= 4);
    if (filter === 'not') rows = rows.filter((r) => !r.allFiveComplete);

    $('#tasks-body').innerHTML =
      rows.length === 0
        ? '<tr><td colspan="5" class="empty">No rows match filter</td></tr>'
        : rows
            .map((r) => {
              const chips = r.tasks
                .map(
                  (t) =>
                    `<span class="task-chip ${t.completed ? 'done' : 'pending'}" title="${esc(t.taskName)}">${t.taskId}</span>`,
                )
                .join('');
              const badge = r.allFiveComplete
                ? '<span class="badge badge-success">All done</span>'
                : r.completedCount > 0
                  ? `<span class="badge badge-muted">${r.completedCount}/${ALL_TASK_IDS.length}</span>`
                  : '<span class="badge badge-muted">None</span>';
              return `<tr>
          <td><a href="#/user-detail/${r.user.id}">${esc(r.user.name || 'Unnamed')}</a><div class="meta">${esc(playerId(r.user))}</div></td>
          <td>${r.completedCount}/${ALL_TASK_IDS.length} ${badge}</td>
          <td>${esc(r.taskDate || '—')}</td>
          <td>${fmtDate(r.updatedAt)}</td>
          <td><div class="task-chips">${chips}</div></td>
        </tr>`;
            })
            .join('');
  }

  if (soft && $('#tasks-body')) {
    await load();
    return;
  }

  if (!isCurrentRoute('tasks')) return;

  pageContent.innerHTML = `
    <div class="page-header">
      <div><h2>Daily tasks</h2><p class="subtitle">Today's completion report • resets at 12:00 AM</p></div>
      <div class="page-actions">
        <div class="toggle-group" id="tasks-filter">
          <button data-f="all" class="${tasksPageState.filter === 'all' ? 'active' : ''}">All</button>
          <button data-f="done" class="${tasksPageState.filter === 'done' ? 'active' : ''}">Done (4+)</button>
          <button data-f="not" class="${tasksPageState.filter === 'not' ? 'active' : ''}">Not Done (&lt;5)</button>
        </div>
        <button class="btn btn-outline btn-sm" id="tasks-reset">Reset daily tasks</button>
        <button class="btn btn-outline btn-sm" id="tasks-refresh">↻ Refresh</button>
      </div>
    </div>
    <p id="tasks-msg" class="subtitle" style="margin-bottom:1rem">${esc(tasksNotice)}</p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Player</th><th>Progress</th><th>Task date</th><th>Updated</th><th>Tasks</th></tr></thead>
        <tbody id="tasks-body"></tbody>
      </table>
    </div>`;

  $('#tasks-filter').onclick = (e) => {
    const btn = e.target.closest('button[data-f]');
    if (!btn) return;
    pauseAutoRefresh(1500);
    filter = btn.dataset.f;
    tasksPageState.filter = filter;
    document.querySelectorAll('#tasks-filter button').forEach((b) => b.classList.toggle('active', b === btn));
    void load();
  };
  $('#tasks-refresh').onclick = () => {
    pauseAutoRefresh(1500);
    void load();
  };
  $('#tasks-reset').onclick = async () => {
    if (!confirm('Reset daily tasks for all users for today?')) return;
    const btn = $('#tasks-reset');
    btn.disabled = true;
    $('#tasks-msg').textContent = 'Resetting…';
    try {
      const count = await resetAllDailyTasks();
      $('#tasks-msg').textContent = `Reset complete for ${count} users.`;
      await load();
    } catch (e) {
      $('#tasks-msg').textContent = e.message || 'Reset failed.';
    } finally {
      btn.disabled = false;
    }
  };
  await load();
}

async function renderSeason(_param, options = {}) {
  const soft = options.soft === true;
  const config = await getSeasonConfig();
  const seasonIndex = await buildSeasonIndex(config);

  if (soft && $('#season-scores-chart-slot')) {
    const selectedSeasonId = seasonPageState.selectedSeasonId || config.seasonId.toLowerCase();
    document.querySelectorAll('#season-pick-row button').forEach((btn) => {
      const sid = btn.dataset.seasonId;
      const s = seasonIndex.getSeason(sid);
      if (s) btn.textContent = `${s.label} (${s.count})`;
      btn.classList.toggle('active', sid === selectedSeasonId);
    });
    const season = seasonIndex.getSeason(selectedSeasonId);
    if (season) {
      const labels = season.users.slice(0, 5).map((u) => u.name || playerId(u));
      const values = season.users.slice(0, 5).map((u) => u.score);
      const overviewLabels = seasonIndex.seasons.map((s) => s.label);
      const overviewValues = seasonIndex.seasons.map((s) => s.count);
      mountChartPanel(
        $('#season-overview-chart-slot'),
        'season-overview',
        'All seasons — users per season',
        overviewLabels,
        overviewValues,
        {
          id: 'chart-all-seasons',
          yLabel: 'Total users',
          xLabel: 'Season',
        },
      );

      const usersBlock = seasonPageState.showScoreUsers
        ? `<div class="season-users-panel" id="score-users-panel">
            <h4>All users in ${esc(season.label)} (${season.count})</h4>
            ${renderSeasonUsersTable(season.users, 'No users in this season yet.')}
          </div>`
        : '';
      const scoresFp = chartFingerprint(labels, values) + (seasonPageState.showScoreUsers ? ':show' : ':hide') + ':' + usersPanelKey(season.users);
      const scoresCacheKey = 'season-scores';
      const scoresSlot = $('#season-scores-chart-slot');
      if (chartRenderCache.get(scoresCacheKey) !== scoresFp || !scoresSlot.querySelector('[data-chart-panel]')) {
        chartRenderCache.set(scoresCacheKey, scoresFp);
        scoresSlot.innerHTML = renderChartPanel(
          `Top scores — ${season.label}`,
          labels,
          values,
          {
            id: 'chart-season-scores',
            yLabel: 'Score',
            xLabel: 'Top players',
            extraButton: seasonPageState.showScoreUsers ? 'Hide users' : 'All users',
            extraButtonId: 'toggle-score-users',
            bodyBelow: usersBlock,
          },
        );
        bindChartControls(scoresSlot);
        const toggleBtn = scoresSlot.querySelector('[data-extra-btn="toggle-score-users"]');
        if (toggleBtn) {
          toggleBtn.onclick = () => {
            seasonPageState.showScoreUsers = !seasonPageState.showScoreUsers;
            chartRenderCache.delete('season-scores');
            void renderSeason(null, { soft: true });
          };
        }
      } else if (seasonPageState.showScoreUsers) {
        const panel = $('#score-users-panel');
        const tableHtml = renderSeasonUsersTable(season.users, 'No users in this season yet.');

      }

  $('#season-form').onsubmit = async (e) => {
    e.preventDefault();
    const saveBtn = document.querySelector('button[form="season-form"]');
    if (saveBtn) saveBtn.disabled = true;
    msg.textContent = 'Saving…';
    try {
      const next = {
        seasonId: $('#season-id').value.trim().toLowerCase(),
        seasonNumber: Number($('#season-number').value),
        seasonLabel: $('#season-label').value.trim(),
      };
      if (!next.seasonId || !next.seasonLabel || !next.seasonNumber) {
        throw new Error('All season fields are required.');
      }
      await saveSeasonConfig(next);
      msg.textContent = 'Season config saved. Users who login now are saved in the new season; old season data stays in seasonHistory.';
      await renderSeason();
    } catch (err) {
      msg.textContent = err.message || 'Failed to save season config.';
    } finally {
      if (saveBtn) saveBtn.disabled = false;
    }
  };
}

// Auth
const signInBtn = $('#btn-google-signin');
signInBtn.onclick = async () => {
  signInBtn.disabled = true;
  signInBtn.textContent = 'Signing in…';
  try {
    await signInWithPopup(auth, googleProvider);
  } catch (err) {
    signInBtn.disabled = false;
    signInBtn.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>

      </svg>
      Sign in with Google`;
    if (err?.code !== 'auth/popup-closed-by-user') {
      alert(err.message || 'Sign-in failed');
    }
  }
};
$('#btn-signout-denied').onclick = () => {
  stopAdminAutoRefresh();
  signOut(auth);
};
$('#btn-signout').onclick = () => {
  stopAdminAutoRefresh();
  signOut(auth);
};
$('#menu-btn').onclick = () => sidebar.classList.toggle('open');

window.navigate = navigate;

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (!user) {
    stopAdminAutoRefresh();
    signInBtn.disabled = false;
    signInBtn.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google`;
    show(loginScreen);
    return;
  }
  isAdmin = await isEmailAdmin(user.email);
  if (!isAdmin) {
    deniedEmail.textContent = user.email;
    show(deniedScreen);
    return;
  }

  await ensureDb();
  show(appShell);
  $('#user-name').textContent = user.displayName || 'Admin';
  $('#user-email').textContent = user.email || '';
  if (user.photoURL) $('#user-avatar').src = user.photoURL;

  if (!location.hash || location.hash === '#') location.hash = '#/dashboard';
  lastHash = location.hash;
  startAdminAutoRefresh();
  await route();
});

window.addEventListener('hashchange', () => {
  if (!isAdmin) return;
  const h = location.hash || '#/dashboard';
  if (h === lastHash) return;
  lastHash = h;
  void route();
});

pageContent.addEventListener('click', (e) => {
  const row = e.target.closest('#users-table-body tr[data-id]');
  if (!row) return;
  e.preventDefault();
  pauseAutoRefresh(3000);
  navigate('user-detail', row.dataset.id);
});

document.querySelectorAll('.nav a').forEach((a) => {
  a.onclick = (e) => {
    e.preventDefault();
    pauseAutoRefresh(2000);
    navigate(a.dataset.page);
    sidebar.classList.remove('open');
  };
});
    </script>
  </body>
