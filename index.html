<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CroomX Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/firebase-init.js"></script>
  </head>
  <body>
    <!-- Login -->
    <div id="login-screen" class="screen-center">
      <div class="auth-card">
        <div class="logo">⚙️</div>
        <h1>CroomX Admin</h1>
        <p>Sign in with your authorized Google admin account.</p>
        <button id="btn-google-signin" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path
              fill="#fff"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
            />
            <path
              fill="#fff"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#fff"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            />
            <path
              fill="#fff"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
          Sign in with Google
        </button>
      </div>
    </div>

    <!-- Access denied -->
    <div id="denied-screen" class="screen-center hidden">
      <div class="auth-card">
        <h1>Access denied</h1>
        <div class="alert alert-error">
          <strong id="denied-email"></strong> is not on the admin allowlist.
        </div>
        <button id="btn-signout-denied" class="btn btn-outline">Sign out</button>
      </div>
    </div>

    <!-- Main app -->
    <div id="app-shell" class="hidden">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">CroomX Admin</div>
        <nav class="nav">
          <a href="#/dashboard" data-page="dashboard"><span class="icon">📊</span> Dashboard</a>
          <a href="#/users" data-page="users"><span class="icon">👥</span> Users</a>
          <a href="#/tasks" data-page="tasks"><span class="icon">✅</span> Daily Tasks</a>
          <a href="#/matches" data-page="matches"><span class="icon">🎮</span> Matches</a>
          <a href="#/ai" data-page="ai"><span class="icon">🤖</span> AI Control</a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-info">
            <img id="user-avatar" src="" alt="" />
            <div>
              <div id="user-name">Admin</div>
              <div id="user-email" class="email"></div>
            </div>
          </div>
          <button id="btn-signout" class="btn btn-outline btn-sm" style="width: 100%">
            Sign out
          </button>
        </div>
      </aside>

      <div class="main">
        <header class="topbar">
          <button id="menu-btn" class="btn btn-outline btn-sm">☰</button>
          <strong>CroomX Admin</strong>
        </header>
        <div id="page-content" class="content"></div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
